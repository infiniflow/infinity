[general]
version = "0.7.0"
time_zone = "utc-8"

[network]
[log]
log_to_stdout = true
log_level = "info"

[storage]
data_dir                 = "/var/infinity/data"
optimize_interval        = "0s"
cleanup_interval         = "3s"
compact_interval         = "3s"
mem_index_capacity       = 8192

[buffer]
buffer_manager_size = "8GB"

[wal]
checkpoint_interval = "3s"

[resource]
