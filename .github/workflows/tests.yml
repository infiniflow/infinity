name: tests

on:
  push:
    branches:
      - 'main'
      - '*.*.*'
    paths-ignore:
      - 'docs/**'
      - '*.md'
  # The only difference between pull_request and pull_request_target is the context in which the workflow runs:
  # — pull_request_target workflows use the workflow files from the default branch, and secrets are available.
  # — pull_request workflows use the workflow files from the pull request branch, and secrets are unavailable.
  pull_request:
    types: [ synchronize, ready_for_review ]
    paths-ignore:
      - 'docs/**'
      - '*.md'

permissions:
  contents: read
  actions: read
  checks: write
  statuses: write

# https://docs.github.com/en/actions/using-jobs/using-concurrency
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  code_static_check:
    name: code_static_check
    if: ${{ github.event_name != 'pull_request' || (github.event.pull_request.draft == false && contains(github.event.pull_request.labels.*.name, 'ci')) }}
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          ref: ${{ (github.event_name == 'pull_request' || github.event_name == 'pull_request_target') && format('refs/pull/{0}/merge', github.event.pull_request.number) || github.sha }}
          fetch-depth: 0
          fetch-tags: false
          submodules: recursive

      # https://github.com/astral-sh/ruff-action
      - name: Static check with Ruff
        uses: astral-sh/ruff-action@v3
        with:
          version: ">=0.14.x"
          args: "check --exclude=**/remote_thrift/infinity_thrift_rpc/**"

      - name: Start builder container
        run: |
          docker run --privileged --cap-add=NET_ADMIN -d --name infinity_builder -v ${PWD}:/infinity -v ${PWD}/resource:/usr/share/infinity/resource infiniflow/infinity_builder:ubuntu22_clang20

      - name: Check format of changed C/C++ files
        run: |
          if [[ ${{ github.event_name }} == 'pull_request' ]]; then
            CHANGED_FILES=$(git diff --name-only ${{ github.event.pull_request.base.sha }}...${{ github.event.pull_request.head.sha }} \
              | grep -E '\.(cpp|h|hpp|cppm)$' \
              | grep -v 'third_party/' \
              | grep -v 'network/' \
              | grep -v 'remote_thrift/infinity_thrift_rpc/' \
              | grep -v 'parser/' || true)

            if [ -n "$CHANGED_FILES" ]; then
              echo "Check format of changed C/C++ files with clang-format-20"

              readarray -t files <<< "$CHANGED_FILES"
              HAS_ERROR=0

              for file in "${files[@]}"; do
                if [ -f "$file" ]; then
                  if docker exec infinity_builder bash -c "cd /infinity; clang-format-20 $file > ${file}.formatted; diff $file ${file}.formatted 2>/dev/null"; then
                    echo "✅ $file"
                  else
                    echo "❌ $file"
                    HAS_ERROR=1
                  fi
                  rm -f "${file}.formatted"
                fi
              done

              if [ $HAS_ERROR -ne 0 ]; then
                exit 1
              fi
            else
              echo "No C++ files changed"
            fi
          fi

      - name: Remove container
        if: always()
        run: docker rm -f infinity_builder || true

  build:
    name: ${{ matrix.type }}_build
    runs-on: ubuntu-latest
    needs: code_static_check
    strategy:
      matrix:
        include:
          - type: debug
            build_type: Debug
            build_dir: cmake-build-debug
            coverage: ON
            targets: infinity
          # - type: reldeb
          #   build_type: RelWithDebInfo
          #   build_dir: cmake-build-reldeb
          #   coverage: OFF
          #   targets: infinity knn_import_benchmark knn_query_benchmark
    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          ref: ${{ (github.event_name == 'pull_request' || github.event_name == 'pull_request_target') && format('refs/pull/{0}/merge', github.event.pull_request.number) || github.sha }}
          fetch-depth: 0
          fetch-tags: false
          submodules: recursive

      - name: Start builder container
        run: |
          docker run --privileged -d --name infinity_builder -v ${PWD}:/infinity -v ${PWD}/resource:/usr/share/infinity/resource infiniflow/infinity_builder:ubuntu22_clang20

      - name: Build ${{ matrix.type }} version
        run: docker exec infinity_builder bash -c "git config --global safe.directory \"*\" && cd /infinity && rm -rf ${{ matrix.build_dir }} && mkdir -p ${{ matrix.build_dir }} && cmake -G Ninja -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} -DCODE_COVERAGE=${{ matrix.coverage }} -S /infinity -B /infinity/${{ matrix.build_dir }} && cmake --build /infinity/${{ matrix.build_dir }} -j --target ${{ matrix.targets }}"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.type }}-build
          path: ${{ matrix.build_dir }}/src/infinity
          retention-days: 1
          if-no-files-found: warn

      - name: Remove build container
        if: always()
        run: docker rm -f infinity_builder || true

  unit_test_build:
    name: ${{ matrix.type }}_unit_test_build
    runs-on: ubuntu-latest
    needs: code_static_check
    strategy:
      matrix:
        include:
          - type: debug
            build_type: Debug
            build_dir: cmake-build-debug
            coverage: ON
          # - type: reldeb
          #   build_type: RelWithDebInfo
          #   build_dir: cmake-build-reldeb
          #   coverage: OFF
    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          ref: ${{ (github.event_name == 'pull_request' || github.event_name == 'pull_request_target') && format('refs/pull/{0}/merge', github.event.pull_request.number) || github.sha }}
          fetch-depth: 0
          fetch-tags: false
          submodules: recursive

      - name: Start builder container
        run: |
          docker run --privileged -d --name infinity_builder -v ${PWD}:/infinity -v ${PWD}/resource:/usr/share/infinity/resource infiniflow/infinity_builder:ubuntu22_clang20

      - name: Build ${{ matrix.type }} unit test
        run: docker exec infinity_builder bash -c "git config --global safe.directory \"*\" && cd /infinity && rm -rf ${{ matrix.build_dir }} && mkdir -p ${{ matrix.build_dir }} && cmake -G Ninja -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} -DCODE_COVERAGE=${{ matrix.coverage }} -S /infinity -B /infinity/${{ matrix.build_dir }} && cmake --build /infinity/${{ matrix.build_dir }} -j --target test_main"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.type }}-unit-test-build
          path: ${{ matrix.build_dir }}/src/test_main
          retention-days: 1
          if-no-files-found: warn

      - name: Remove build container
        if: always()
        run: docker rm -f infinity_builder || true

  debug_unit_test:
    name: debug_unit_test
    runs-on: ubuntu-latest
    needs: unit_test_build
    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          ref: ${{ (github.event_name == 'pull_request' || github.event_name == 'pull_request_target') && format('refs/pull/{0}/merge', github.event.pull_request.number) || github.sha }}
          fetch-depth: 0
          submodules: recursive

      - name: Download debug unit test build artifacts
        uses: actions/download-artifact@v4
        with:
          name: debug-unit-test-build
          path: .

      - name: Prepare environment
        run: |
          chmod +x test_main
          sudo mkdir -p /usr/share/infinity/resource
          sudo cp -r resource/* /usr/share/infinity/resource/
          sudo mkdir -p /var/infinity
          sudo chown -R ${USER} /var/infinity

      - name: Unit test
        run: |
          ./test_main --gtest_filter=-*SLOW_* > debug_unit_test_stdout.log 2> debug_unit_test_stderr.log

      - name: Collect infinity log
        if: always()
        run: |
          echo "debug unit test log" && tail -n 1000 debug_unit_test*.log || true

  debug_sqllogical_test:
    name: debug_sqllogical_test
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          ref: ${{ (github.event_name == 'pull_request' || github.event_name == 'pull_request_target') && format('refs/pull/{0}/merge', github.event.pull_request.number) || github.sha }}
          fetch-depth: 0
          submodules: recursive

      - name: Download debug build artifacts
        uses: actions/download-artifact@v4
        with:
          name: debug-build
          path: .

      - name: Prepare environment
        run: |
          chmod +x infinity
          sudo mkdir -p /usr/share/infinity/resource
          sudo cp -r resource/* /usr/share/infinity/resource/
          sudo mkdir -p /var/infinity
          sudo chown -R ${USER} /var/infinity

      - name: Install Python SDK
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
      - run: uv sync --python 3.11 --frozen --extra test

      - name: Start infinity server
        run: |
          nohup ./infinity --config=conf/pytest_parallel_infinity_conf.toml > infinity.log 2>&1 &
          sleep 15s

      - name: Run sqllogictest
        run: uv run python3 tools/sqllogictest.py

      - name: Collect infinity log
        if: always()
        run: |
          cat infinity.log || true

      - name: Stop infinity server
        if: always()
        run: pkill -f infinity || true

  debug_restart_test:
    name: debug_restart_test
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          ref: ${{ (github.event_name == 'pull_request' || github.event_name == 'pull_request_target') && format('refs/pull/{0}/merge', github.event.pull_request.number) || github.sha }}
          fetch-depth: 0
          submodules: recursive

      - name: Download debug build artifacts
        uses: actions/download-artifact@v4
        with:
          name: debug-build
          path: .

      - name: Prepare environment
        run: |
          chmod +x infinity
          sudo mkdir -p /usr/share/infinity/resource
          sudo cp -r resource/* /usr/share/infinity/resource/
          sudo mkdir -p /var/infinity
          sudo chown -R ${USER} /var/infinity

      - name: Install Python SDK
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
      - run: uv sync --python 3.11 --frozen --extra test

      - name: Run restart test
        run: |
          uv run python3 tools/run_restart_test.py --infinity_path=./infinity

      - name: Collect infinity log
        if: always()
        run: |
          echo "debug_restart_test log(last 1000 lines):" && tail -n 1000 restart_test*.log* || true

  debug_pysdk_test:
    name: debug_pysdk_test
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          ref: ${{ (github.event_name == 'pull_request' || github.event_name == 'pull_request_target') && format('refs/pull/{0}/merge', github.event.pull_request.number) || github.sha }}
          fetch-depth: 0
          submodules: recursive

      - name: Download debug build artifacts
        uses: actions/download-artifact@v4
        with:
          name: debug-build
          path: .

      - name: Prepare environment
        run: |
          chmod +x infinity
          sudo mkdir -p /usr/share/infinity/resource
          sudo cp -r resource/* /usr/share/infinity/resource/
          sudo mkdir -p /var/infinity
          sudo chown -R ${USER} /var/infinity

      - name: Install Python SDK
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
      - run: uv sync --python 3.11 --frozen --extra test

      - name: Start infinity server
        run: |
          nohup ./infinity --config=conf/pytest_parallel_infinity_conf.toml > infinity.log 2>&1 &
          sleep 15s

      - name: Run pysdk test
        run: uv run python3 tools/run_pysdk_remote_infinity_test.py

      - name: Collect infinity log
        if: always()
        run: |
          cat infinity.log || true

      - name: Stop infinity server
        if: always()
        run: pkill -f infinity || true

  debug_go_test:
    name: debug_go_test
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          ref: ${{ (github.event_name == 'pull_request' || github.event_name == 'pull_request_target') && format('refs/pull/{0}/merge', github.event.pull_request.number) || github.sha }}
          fetch-depth: 0
          submodules: recursive

      - name: Download debug build artifacts
        uses: actions/download-artifact@v4
        with:
          name: debug-build
          path: .

      - name: Prepare environment
        run: |
          chmod +x infinity
          sudo mkdir -p /usr/share/infinity/resource
          sudo cp -r resource/* /usr/share/infinity/resource/
          sudo mkdir -p /var/infinity
          sudo chown -R ${USER} /var/infinity

      - name: Install Python SDK
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
      - run: uv sync --python 3.11 --frozen --extra test

      - name: Start infinity server
        run: |
          nohup ./infinity --config=conf/pytest_parallel_infinity_conf.toml > infinity.log 2>&1 &
          sleep 15s

      - name: Run Go tests
        run: |
          uv run python3 tools/sqllogictest.py -jc=1
          cd go && go version && go test ./tests/... -v 2>&1 | tee ../debug_go_test.log; exit_code=${PIPESTATUS[0]}; if [ $exit_code -ne 0 ]; then echo "=== FAILED TESTS ==="; grep -E "^(FAIL|panic:|^--- FAIL)" ../debug_go_test.log || true; exit $exit_code; fi

      - name: Collect infinity log
        if: always()
        run: |
          cat infinity.log || true
          cat debug_go_test.log || true

      - name: Stop infinity server
        if: always()
        run: pkill -f infinity || true

  debug_http_test:
    name: debug_http_test
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          ref: ${{ (github.event_name == 'pull_request' || github.event_name == 'pull_request_target') && format('refs/pull/{0}/merge', github.event.pull_request.number) || github.sha }}
          fetch-depth: 0
          submodules: recursive

      - name: Download debug build artifacts
        uses: actions/download-artifact@v4
        with:
          name: debug-build
          path: .

      - name: Prepare environment
        run: |
          chmod +x infinity
          sudo mkdir -p /usr/share/infinity/resource
          sudo cp -r resource/* /usr/share/infinity/resource/
          sudo mkdir -p /var/infinity
          sudo chown -R ${USER} /var/infinity

      - name: Install Python SDK
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
      - run: uv sync --python 3.11 --frozen --extra test

      - name: Start infinity server
        run: |
          nohup ./infinity --config=conf/pytest_parallel_infinity_conf.toml > infinity.log 2>&1 &
          sleep 15s

      - name: Run http test
        run: uv run python3 tools/run_http_api.py

      - name: Collect infinity log
        if: always()
        run: |
          cat infinity.log || true

      - name: Stop infinity server
        if: always()
        run: pkill -f infinity || true

  debug_pysdk_parallel_test:
    name: debug_pysdk_parallel_test
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          ref: ${{ (github.event_name == 'pull_request' || github.event_name == 'pull_request_target') && format('refs/pull/{0}/merge', github.event.pull_request.number) || github.sha }}
          fetch-depth: 0
          submodules: recursive

      - name: Download debug build artifacts
        uses: actions/download-artifact@v4
        with:
          name: debug-build
          path: .

      - name: Prepare environment
        run: |
          chmod +x infinity
          sudo mkdir -p /usr/share/infinity/resource
          sudo cp -r resource/* /usr/share/infinity/resource/
          sudo mkdir -p /var/infinity
          sudo chown -R ${USER} /var/infinity

      - name: Install Python SDK
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
      - run: uv sync --python 3.11 --frozen --extra test

      - name: Start infinity server
        run: |
          nohup ./infinity --config=conf/pytest_parallel_infinity_conf.toml > infinity.log 2>&1 &
          sleep 15s

      - name: Run pysdk test
        run: uv run python3 tools/run_parallel_test.py

      - name: Collect infinity log
        if: always()
        run: |
          cat infinity.log || true

      - name: Stop infinity server
        if: always()
        run: pkill -f infinity || true

