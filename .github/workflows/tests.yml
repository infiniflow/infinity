          sleep 5s
          docker exec infinity_test bash -c 'cd /infinity && uv run python3 tools/run_restart_test.py --infinity_path=cmake-build-debug/src/infinity'

      - name: Collect infinity log
        if: always()
        run: |
          echo "debug_restart_test log(last 1000 lines):" && tail -n 1000 restart_test*.log* || true

      - name: Remove container
        if: always()
        run: docker rm -f infinity_test || true

