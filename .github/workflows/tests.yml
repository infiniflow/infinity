  debug_arm64_build:
    name: debug_arm64_build
    needs: [ check_builder_changes, build_and_push_builder ]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android/sdk /opt/ghc /opt/hostedtoolcache/CodeQL
          df -h /

      - name: Check out code
        uses: actions/checkout@v6
        with:
          ref: ${{ (github.event_name == 'pull_request' || github.event_name == 'pull_request_target') && format('refs/pull/{0}/merge', github.event.pull_request.number) || github.sha }}
          fetch-depth: 0
          fetch-tags: false
          submodules: recursive

      - name: Start builder container
        run: |
          docker run --privileged -d --name infinity_builder -v ${PWD}:/infinity -v ${PWD}/resource:/usr/share/infinity/resource infiniflow/infinity-x64-arm64-builder:${{ needs.check_builder_changes.outputs.image_tag }}

      - name: Create libstdc++ modules JSON for cross-compilation
        run: docker exec infinity_builder bash -c "cp /infinity/.github/workflows/x64-arm64-libstdc++.modules.json /x86_64-aarch64-none-linux-gnu-15.2.1/lib/gcc/aarch64-none-linux-gnu/15.2.1/libstdc++.modules.json"

      - name: Build debug version
        run: |
          docker exec infinity_builder bash -c "git config --global safe.directory \"*\" && cd /infinity && rm -rf cmake-build-debug && mkdir -p cmake-build-debug && SYS_ROOT=/x86_64-aarch64-none-linux-gnu-15.2.1/aarch64-none-linux-gnu/libc/ GCC_TOOLCHAIN=/x86_64-aarch64-none-linux-gnu-15.2.1/ cmake -G Ninja -DCMAKE_C_COMPILER=clang-20 -DCMAKE_CXX_COMPILER=clang++-20  -DCMAKE_TOOLCHAIN_FILE=\$VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake -DVCPKG_CHAINLOAD_TOOLCHAIN_FILE=\$PWD/cmake/toolchains/arm64-linux.cmake -DVCPKG_OVERLAY_TRIPLETS=\$PWD/cmake/triplets -DVCPKG_TARGET_TRIPLET=arm64-linux -DCMAKE_CXX_STDLIB_MODULES_JSON=/x86_64-aarch64-none-linux-gnu-15.2.1/lib/gcc/aarch64-none-linux-gnu/15.2.1/libstdc++.modules.json -DCMAKE_BUILD_TYPE=Debug -S /infinity -B /infinity/cmake-build-debug && cmake --build /infinity/cmake-build-debug -j --target infinity test_main"

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: debug-build-arm64
          path: |
            cmake-build-debug/src/infinity
            cmake-build-debug/src/test_main
          retention-days: 1
          if-no-files-found: warn

      - name: Remove build container
        if: always()
        run: docker rm -f infinity_builder || true

  debug_arm64_unit_test:
    name: debug_arm64_unit_test
    runs-on: ubuntu-24.04-arm
    needs: debug_arm64_build
    steps:
      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: false
          swap-storage: true

      - name: Check out code
        uses: actions/checkout@v6
        with:
          ref: ${{ (github.event_name == 'pull_request' || github.event_name == 'pull_request_target') && format('refs/pull/{0}/merge', github.event.pull_request.number) || github.sha }}
          fetch-depth: 0
          submodules: recursive

      - name: Start minio container
        run: |
          docker run -d --name minio --network host -e "MINIO_ROOT_PASSWORD=minioadmin" -e "MINIO_ROOT_USER=minioadmin" -v /tmp/minio-data:/data quay.io/minio/minio server /data --console-address ":9006" --address ":9005"

      - name: Download debug build artifacts
        uses: actions/download-artifact@v8
        with:
          name: debug-build-arm64

      - name: Install Python SDK
        uses: astral-sh/setup-uv@v7
      #        with:
      #          enable-cache: true
      - run: uv sync --python 3.11 --extra test --index-url https://pypi.org/simple/

      - name: Download nltk data
        run: |
          uv run python -c "
          import os
          import nltk
          local_dir = os.path.abspath('nltk_data')
          for data in ['wordnet', 'punkt', 'punkt_tab']:
              print(f'Downloading nltk {data}...')
              nltk.download(data, download_dir=local_dir)
          "

      - name: Prepare environment
        run: |
          chmod +x test_main
          sudo mkdir -p /usr/share/infinity/resource
          sudo cp -r resource/* /usr/share/infinity/resource/
          sudo chown -R ${USER} /usr/share/infinity
          sudo mkdir -p /var/infinity
          sudo chown -R ${USER} /var/infinity

      - name: Wait for minio and run unit test
        env:
          NLTK_DATA: ${{ github.workspace }}/nltk_data
        run: |
          ./scripts/wait_for_minio.sh
          ASAN_OPTIONS=detect_leaks=0 ./test_main --gtest_filter=-*SLOW_* > debug_arm64_unit_test_stdout.log 2> debug_arm64_unit_test_stderr.log

      - name: Collect infinity log
        if: always()
        run: |
          echo "debug arm64 unit test log" && tail -n 1000 debug_arm64_unit_test*.log || true

      - name: Remove minio container
        if: always()
        run: docker rm -f minio || true

