      - run: uv sync --python 3.11 --frozen --extra test

      - name: Start infinity server
        run: |
          docker run --privileged -d --name infinity_server --network host -v ${PWD}:/infinity -v /tmp/infinity/resource:/usr/share/infinity/resource -v /tmp/var/infinity:/var/infinity -e LLVM_PROFILE_FILE="infinity-%p.profraw" -e LLVM_PROFILE_DUMP_ON_EXIT=1 infiniflow/infinity_builder:ubuntu22_clang20 bash -c 'cd /infinity && /infinity/cmake-build-debug/src/infinity --config=/infinity/conf/pytest_parallel_infinity_conf.toml > /infinity/debug_go_stderr.log 2>&1'
          sleep 10s
          curl -s http://localhost:23817/api/v1/database || { echo "Infinity server not ready"; exit 1; }

      - name: Run Go tests
        run: |
          docker exec infinity_server bash -c 'cd /infinity && uv run python3 tools/sqllogictest.py -jc=1'
          docker exec infinity_server bash -c 'cd /infinity/go && go version && go test ./tests/... -v 2>&1 | tee /infinity/debug_go_test.log; exit_code=${PIPESTATUS[0]}; if [ $exit_code -ne 0 ]; then echo "=== FAILED TESTS ==="; grep -E "^(FAIL|panic:|^--- FAIL)" /infinity/debug_go_test.log || true; exit $exit_code; fi'

      - name: Collect infinity log
        if: always()
        run: |
          docker logs infinity_server || true
          cat debug_go_stderr.log || true
          cat debug_go_test.log || true

      - name: Generate LCOV report
        if: ${{ !cancelled() && !failure() }}
        run: |
          docker exec infinity_server bash -c 'cd /infinity && llvm-profdata-20 merge -sparse infinity-*.profraw -o coverage.profdata && llvm-cov-20 export cmake-build-debug/src/infinity -instr-profile=coverage.profdata -format=lcov -ignore-filename-regex=".*third_party.*|.*cmake-build-debug.*|.*cppm.*" > coverage.lcov' || true
