  build_arm:
    name: ${{ matrix.type }}_build_arm
    runs-on: [ "self-hosted", "infinity-build-arm" ]
    strategy:
      matrix:
        include:
          - type: debug
            build_type: Debug
            build_dir: cmake-build-debug
          # - type: reldeb
          #   build_type: RelWithDebInfo
          #   build_dir: cmake-build-reldeb
    steps:
      - name: Ensure workspace ownership
        run: echo "chown -R ${USER} ${GITHUB_WORKSPACE}" && sudo chown -R ${USER} ${GITHUB_WORKSPACE}

      - name: Check out code
        uses: actions/checkout@v4
        with:
          ref: ${{ (github.event_name == 'pull_request' || github.event_name == 'pull_request_target') && format('refs/pull/{0}/merge', github.event.pull_request.number) || github.sha }}
          fetch-depth: 0
          fetch-tags: false
          submodules: recursive

      - name: Start builder container
        run: |
          BUILDER_CONTAINER=infinity_build_$(od -An -N4 -tx4 /dev/urandom | tr -d ' ')
          echo "BUILDER_CONTAINER=${BUILDER_CONTAINER}" >> ${GITHUB_ENV}
          TZ=${TZ:-$(readlink -f /etc/localtime | awk -F '/zoneinfo/' '{print $2}')}
          sudo docker run --privileged -d --name ${BUILDER_CONTAINER} -e TZ=${TZ} -e UV_INDEX=https://pypi.tuna.tsinghua.edu.cn/simple -v ${PWD}:/infinity -v ${PWD}/resource:/usr/share/infinity/resource infiniflow/infinity_builder:ubuntu22_clang20

      - name: Build ${{ matrix.type }} version
        run: sudo docker exec ${BUILDER_CONTAINER} bash -c "git config --global safe.directory \"*\" && cd /infinity && rm -rf ${{ matrix.build_dir }} && mkdir -p ${{ matrix.build_dir }} && cmake -G Ninja -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} -S /infinity -B /infinity/${{ matrix.build_dir }} && cmake --build /infinity/${{ matrix.build_dir }} -j --target infinity test_main"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.type }}-build-arm
          path: |
            ${{ matrix.build_dir }}/src/infinity
            ${{ matrix.build_dir }}/src/test_main
          retention-days: 1
          if-no-files-found: warn

      - name: Remove build container
        if: always()
        run: |
          if [[ -n "${BUILDER_CONTAINER}" ]]; then
            sudo docker rm -f -v "${BUILDER_CONTAINER}"
          fi

  unit_test_arm:
    name: ${{ matrix.type }}_unit_test_arm
    runs-on: [ "self-hosted", "infinity-test-arm" ]
    needs: build_arm
    strategy:
      matrix:
        include:
          - type: debug
            build_dir: cmake-build-debug
          # - type: reldeb
          #   build_dir: cmake-build-reldeb
    steps:
      - name: Ensure workspace ownership
        run: echo "chown -R ${USER} ${GITHUB_WORKSPACE}" && sudo chown -R ${USER} ${GITHUB_WORKSPACE}

      - name: Check out code
        uses: actions/checkout@v4
        with:
          ref: ${{ (github.event_name == 'pull_request' || github.event_name == 'pull_request_target') && format('refs/pull/{0}/merge', github.event.pull_request.number) || github.sha }}
          fetch-depth: 0
          submodules: recursive

      - name: Download ${{ matrix.type }} build artifacts
        uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.type }}-build-arm
          path: .

      - name: Prepare environment
        run: |
          chmod +x ${{ matrix.build_dir }}/src/test_main
          sudo mkdir -p /usr/share/infinity/ && sudo cp -rf resource /usr/share/infinity/ && sudo chown -R ${USER} /usr/share/infinity/resource
          sudo rm -rf /var/infinity && sudo mkdir -p /var/infinity && sudo chown -R ${USER} /var/infinity

      - name: Unit test
        run: |
          ${{ matrix.build_dir }}/src/test_main > ${{ matrix.type }}_unit_test_arm_stdout.log 2> ${{ matrix.type }}_unit_test_arm_stderr.log

      - name: Collect infinity log
        if: always()
        run: |
          echo "${{ matrix.type }} unit test arm log" && tail -n 1000 ${{ matrix.type }}_unit_test_arm*.log || true
