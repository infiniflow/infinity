name: tests

on:
  push:
    branches:
      - 'main'
      - '*.*.*'
    paths-ignore:
      - 'docs/**'
      - '*.md'
  # The only difference between pull_request and pull_request_target is the context in which the workflow runs:
  # — pull_request_target workflows use the workflow files from the default branch, and secrets are available.
  # — pull_request workflows use the workflow files from the pull request branch, and secrets are unavailable.
  pull_request:
    types: [ synchronize, ready_for_review ]
    paths-ignore:
      - 'docs/**'
      - '*.md'

permissions:
  contents: read
  actions: read
  checks: write
  statuses: write

# https://docs.github.com/en/actions/using-jobs/using-concurrency
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  code_static_check:
    name: code_static_check
    if: ${{ github.event_name != 'pull_request' || (github.event.pull_request.draft == false && contains(github.event.pull_request.labels.*.name, 'ci')) }}
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          ref: ${{ (github.event_name == 'pull_request' || github.event_name == 'pull_request_target') && format('refs/pull/{0}/merge', github.event.pull_request.number) || github.sha }}
          fetch-depth: 0
          fetch-tags: false
          submodules: recursive

      # https://github.com/astral-sh/ruff-action
      - name: Static check with Ruff
        uses: astral-sh/ruff-action@v3
        with:
          version: ">=0.14.x"
          args: "check --exclude=**/remote_thrift/infinity_thrift_rpc/**"

      - name: Start builder container
        run: |
          docker run --privileged --cap-add=NET_ADMIN -d --name infinity_builder -v ${PWD}:/infinity -v ${PWD}/resource:/usr/share/infinity/resource infiniflow/infinity_builder:ubuntu22_clang20

      - name: Check format of changed C/C++ files
        run: |
          if [[ ${{ github.event_name }} == 'pull_request' ]]; then
            CHANGED_FILES=$(git diff --name-only ${{ github.event.pull_request.base.sha }}...${{ github.event.pull_request.head.sha }} \
              | grep -E '\.(cpp|h|hpp|cppm)$' \
              | grep -v 'third_party/' \
              | grep -v 'network/' \
              | grep -v 'remote_thrift/infinity_thrift_rpc/' \
              | grep -v 'parser/' || true)

            if [ -n "$CHANGED_FILES" ]; then
              echo "Check format of changed C/C++ files with clang-format-20"

              readarray -t files <<< "$CHANGED_FILES"
              HAS_ERROR=0

              for file in "${files[@]}"; do
                if [ -f "$file" ]; then
                  if docker exec infinity_builder bash -c "cd /infinity; clang-format-20 $file > ${file}.formatted; diff $file ${file}.formatted 2>/dev/null"; then
                    echo "✅ $file"
                  else
                    echo "❌ $file"
                    HAS_ERROR=1
                  fi
                  rm -f "${file}.formatted"
                fi
              done

              if [ $HAS_ERROR -ne 0 ]; then
                exit 1
              fi
            else
              echo "No C++ files changed"
            fi
          fi

      - name: Remove container
        if: always()
        run: docker rm -f infinity_builder || true

  build:
    name: ${{ matrix.type }}_build
    runs-on: ubuntu-latest
    needs: code_static_check
    strategy:
      matrix:
        include:
          - type: debug
            build_type: Debug
            build_dir: cmake-build-debug
            coverage: ON
            targets: infinity test_main
          - type: reldeb
            build_type: RelWithDebInfo
            build_dir: cmake-build-reldeb
            coverage: OFF
            targets: infinity test_main knn_import_benchmark knn_query_benchmark
    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          ref: ${{ (github.event_name == 'pull_request' || github.event_name == 'pull_request_target') && format('refs/pull/{0}/merge', github.event.pull_request.number) || github.sha }}
          fetch-depth: 0
          fetch-tags: false
          submodules: recursive

      - name: Start builder container
        run: |
          docker run --privileged -d --name infinity_builder -v ${PWD}:/infinity -v ${PWD}/resource:/usr/share/infinity/resource infiniflow/infinity_builder:ubuntu22_clang20

      - name: Build ${{ matrix.type }} version
        run: docker exec infinity_builder bash -c "git config --global safe.directory \"*\" && cd /infinity && rm -rf ${{ matrix.build_dir }} && mkdir -p ${{ matrix.build_dir }} && cmake -G Ninja -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} -DCODE_COVERAGE=${{ matrix.coverage }} -S /infinity -B /infinity/${{ matrix.build_dir }} && cmake --build /infinity/${{ matrix.build_dir }} -j --target ${{ matrix.targets }}"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.type }}-build
          path: |
            ${{ matrix.build_dir }}/src/infinity
            ${{ matrix.build_dir }}/src/test_main
            ${{ matrix.type == 'reldeb' && format('{0}/benchmark/local_infinity/knn_import_benchmark', matrix.build_dir) || '' }}
            ${{ matrix.type == 'reldeb' && format('{0}/benchmark/local_infinity/knn_query_benchmark', matrix.build_dir) || '' }}
          retention-days: 1
          if-no-files-found: warn

      - name: Remove build container
        if: always()
        run: docker rm -f infinity_builder || true

  debug_unit_test:
    name: debug_unit_test
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          ref: ${{ (github.event_name == 'pull_request' || github.event_name == 'pull_request_target') && format('refs/pull/{0}/merge', github.event.pull_request.number) || github.sha }}
          fetch-depth: 0
          submodules: recursive

      - name: Download debug build artifacts
        uses: actions/download-artifact@v4
        with:
          name: debug-build
          path: .

      - name: Prepare environment
        run: |
          chmod +x cmake-build-debug/src/test_main
          mkdir -p /tmp/infinity/resource
          cp -r resource/* /tmp/infinity/resource/
          mkdir -p /tmp/var/infinity

      - name: Start builder container
        run: |
          docker run --privileged -d --name infinity_test -v ${PWD}:/infinity -v /tmp/infinity/resource:/usr/share/infinity/resource -v /tmp/var/infinity:/var/infinity infiniflow/infinity_builder:ubuntu22_clang20
          sleep 5s

      - name: Unit test
        run: |
          docker exec infinity_test bash -c 'export LLVM_PROFILE_FILE="infinity-%p.profraw" && ASAN_OPTIONS=detect_leaks=0 /infinity/cmake-build-debug/src/test_main --gtest_also_run_disabled_tests --gtest_filter=-*SLOW_* > /infinity/debug_unit_test_stdout.log 2> /infinity/debug_unit_test_stderr.log'

      - name: Collect infinity log
        if: always()
        run: |
          echo "debug unit test log" && tail -n 1000 debug_unit_test*.log || true

      - name: Generate LCOV report
        if: ${{ !cancelled() && !failure() }}
        run: |
          docker exec infinity_test bash -c 'cd /infinity && llvm-profdata-20 merge -sparse infinity-*.profraw -o coverage.profdata && llvm-cov-20 export cmake-build-debug/src/test_main -instr-profile=coverage.profdata -format=lcov -ignore-filename-regex=".*unit_test.*|.*third_party.*|.*cmake-build-debug.*|.*cppm.*" > coverage.lcov'
          head -10 coverage.lcov || true

      - name: Upload coverage to Codecov
        if: ${{ !cancelled() && !failure() }}
        uses: codecov/codecov-action@v4
        with:
          files: coverage.lcov
          flags: debug_unit_test

      - name: Remove container
        if: always()
        run: docker rm -f infinity_test || true

  debug_sqllogical_test:
    name: debug_sqllogical_test
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          ref: ${{ (github.event_name == 'pull_request' || github.event_name == 'pull_request_target') && format('refs/pull/{0}/merge', github.event.pull_request.number) || github.sha }}
          fetch-depth: 0
          submodules: recursive

      - name: Download debug build artifacts
        uses: actions/download-artifact@v4
        with:
          name: debug-build
          path: .

      - name: Prepare environment
        run: |
          chmod +x cmake-build-debug/src/infinity
          mkdir -p /tmp/infinity/resource
          cp -r resource/* /tmp/infinity/resource/
          mkdir -p /tmp/var/infinity

      - name: Install Python SDK
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
      - run: uv sync --python 3.11 --frozen --extra test

      - name: Start infinity server
        run: |
          docker run --privileged -d --name infinity_server --network host -v ${PWD}:/infinity -v /tmp/infinity/resource:/usr/share/infinity/resource -v /tmp/var/infinity:/var/infinity -e LLVM_PROFILE_FILE="infinity-%p.profraw" -e LLVM_PROFILE_DUMP_ON_EXIT=1 infiniflow/infinity_builder:ubuntu22_clang20 bash -c 'cd /infinity && /infinity/cmake-build-debug/src/infinity --config=/infinity/conf/pytest_parallel_infinity_conf.toml > /infinity/debug_sqllogictest_stderr.log 2>&1'
          sleep 10s
          curl -s http://localhost:23817/api/v1/database || { echo "Infinity server not ready"; exit 1; }

      - name: Run sqllogictest
        run: uv run python3 tools/sqllogictest.py

      - name: Collect infinity log
        if: always()
        run: |
          docker logs infinity_server || true
          cat debug_sqllogictest_stderr.log || true

      - name: Generate LCOV report
        if: ${{ !cancelled() && !failure() }}
        run: |
          docker exec infinity_server bash -c 'cd /infinity && llvm-profdata-20 merge -sparse infinity-*.profraw -o coverage.profdata && llvm-cov-20 export cmake-build-debug/src/infinity -instr-profile=coverage.profdata -format=lcov -ignore-filename-regex=".*third_party.*|.*cmake-build-debug.*|.*cppm.*" > coverage.lcov' || true
          head -10 coverage.lcov || true

      - name: Upload coverage to Codecov
        if: ${{ !cancelled() && !failure() }}
        uses: codecov/codecov-action@v4
        with:
          files: coverage.lcov
          flags: debug_sqllogical_test

      - name: Stop infinity server
        if: always()
        run: docker rm -f infinity_server || true

