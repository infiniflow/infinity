name: tests

on:
  push:
    branches:
      - 'main'
      - '*.*.*'
    paths-ignore:
      - 'docs/**'
      - '*.md'
  # The only difference between pull_request and pull_request_target is the context in which the workflow runs:
  # — pull_request_target workflows use the workflow files from the default branch, and secrets are available.
  # — pull_request workflows use the workflow files from the pull request branch, and secrets are unavailable.
  pull_request:
    types: [ synchronize, ready_for_review ]
    paths-ignore:
      - 'docs/**'
      - '*.md'

permissions:
  contents: read
  actions: read
  checks: write
  statuses: write

# https://docs.github.com/en/actions/using-jobs/using-concurrency
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  check_builder_changes:
    name: check_builder_changes
    if: ${{ github.event_name != 'pull_request' || (github.event.pull_request.draft == false && contains(github.event.pull_request.labels.*.name, 'ci')) }}
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.check.outputs.changed }}
      image_tag: ${{ steps.check.outputs.image_tag }}
    steps:
      - name: Check out code
        uses: actions/checkout@v6
        with:
          ref: ${{ (github.event_name == 'pull_request' || github.event_name == 'pull_request_target') && format('refs/pull/{0}/merge', github.event.pull_request.number) || github.sha }}
          fetch-depth: 0

      - name: Check if Dockerfile changed
        id: check
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
            HEAD_SHA="${{ github.event.pull_request.head.sha }}"
            IMAGE_TAG="pr-${{ github.event.pull_request.number }}"
          else
            BASE_SHA="${{ github.event.before }}"
            HEAD_SHA="${{ github.event.after }}"
            IMAGE_TAG="latest"
          fi
          if [[ "$BASE_SHA" == "0000000000000000000000000000000000000000" ]]; then
            BASE_SHA=$(git rev-list --max-parents=0 HEAD)
          fi
          if git diff --name-only "$BASE_SHA" "$HEAD_SHA" | grep -q 'scripts/Dockerfile_infinity_builder_ubuntu22'; then
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "image_tag=${IMAGE_TAG}" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "image_tag=latest" >> $GITHUB_OUTPUT
          fi

  build_and_push_builder:
    name: build_and_push_${{ matrix.target }}
    needs: check_builder_changes
    if: needs.check_builder_changes.outputs.changed == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target:
          - infinity-x64-arm64-builder
          - infinity-x64-x64-v1-builder
          - infinity-x64-x64-v2-builder
          - infinity-x64-x64-v3-builder
          - infinity-x64-x64-v4-builder
    steps:
      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: false
          swap-storage: true

      - name: Check out code
        uses: actions/checkout@v6
        with:
          ref: ${{ (github.event_name == 'pull_request' || github.event_name == 'pull_request_target') && format('refs/pull/{0}/merge', github.event.pull_request.number) || github.sha }}
          fetch-depth: 0
          submodules: recursive

      - name: Build ${{ matrix.target }} image
        run: docker build -f ./scripts/Dockerfile_infinity_builder_ubuntu22 --target ${{ matrix.target }} -t infiniflow/${{ matrix.target }}:${{ needs.check_builder_changes.outputs.image_tag }} .

      - name: Login to Docker Hub
        run: docker login --username infiniflow --password-stdin <<< ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push image to Docker Hub
        run: docker push infiniflow/${{ matrix.target }}:${{ needs.check_builder_changes.outputs.image_tag }}

      - name: Push as latest
        if: github.event_name == 'push'
        run: |
          docker image tag infiniflow/${{ matrix.target }}:${{ needs.check_builder_changes.outputs.image_tag }} infiniflow/${{ matrix.target }}:latest
          docker push infiniflow/${{ matrix.target }}:latest

      - name: Cleanup pr-* image
        if: github.event_name == 'push'
        run: |
          TOKEN=$(curl -s -H "Content-Type: application/json" -X POST https://hub.docker.com/v2/users/login/ -d "{\"username\": \"infiniflow\", \"password\": \"${{ secrets.DOCKERHUB_TOKEN }}\"}" | jq -r .token)
          TAGS=$(curl -s -H "Authorization: JWT $TOKEN" "https://hub.docker.com/v2/repositories/infiniflow/${{ matrix.target }}/tags/?page_size=100" | jq -r '.results[].name | select(startswith(\"pr-\"))')
          for TAG in $TAGS; do
            echo "Deleting tag: $TAG"
            curl -s -X DELETE -H "Authorization: JWT $TOKEN" "https://hub.docker.com/v2/repositories/infiniflow/${{ matrix.target }}/tags/$TAG/"
          done

  code_static_check:
    name: code_static_check
    needs: [ check_builder_changes, build_and_push_builder ]
    if: always() && (github.event_name != 'pull_request' || (github.event.pull_request.draft == false && contains(github.event.pull_request.labels.*.name, 'ci')))
    runs-on: ubuntu-latest
    steps:
      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: false
          swap-storage: true

      - name: Check out code
        uses: actions/checkout@v6
        with:
          ref: ${{ (github.event_name == 'pull_request' || github.event_name == 'pull_request_target') && format('refs/pull/{0}/merge', github.event.pull_request.number) || github.sha }}
          fetch-depth: 0
          fetch-tags: false
          submodules: recursive

      - name: Static check with Ruff
        uses: astral-sh/ruff-action@v3
        with:
          version: ">=0.14.x"
          args: "check --exclude=**/remote_thrift/infinity_thrift_rpc/**"

      - name: Start builder container
        run: |
          docker run --privileged --cap-add=NET_ADMIN -d --name infinity_builder -v ${PWD}:/infinity -v ${PWD}/resource:/usr/share/infinity/resource infiniflow/infinity-x64-x64-v4-builder:${{ needs.check_builder_changes.outputs.image_tag }}

      - name: Check format of changed C/C++ files
        run: |
          if [[ ${{ github.event_name }} == 'pull_request' ]]; then
            CHANGED_FILES=$(git diff --name-only ${{ github.event.pull_request.base.sha }}...${{ github.event.pull_request.head.sha }} \
              | grep -E '\.(cpp|h|hpp|cppm)$' \
              | grep -v 'third_party/' \
              | grep -v 'network/' \
              | grep -v 'remote_thrift/infinity_thrift_rpc/' \
              | grep -v 'parser/' || true)

            if [ -n "$CHANGED_FILES" ]; then
              echo "Check format of changed C/C++ files with clang-format-20"

              readarray -t files <<< "$CHANGED_FILES"
              HAS_ERROR=0

              for file in "${files[@]}"; do
                if [ -f "$file" ]; then
                  if docker exec infinity_builder bash -c "cd /infinity; clang-format-20 $file > ${file}.formatted; diff $file ${file}.formatted 2>/dev/null"; then
                    echo "✅ $file"
                  else
                    echo "❌ $file"
                    HAS_ERROR=1
                  fi
                  rm -f "${file}.formatted"
                fi
              done

              if [ $HAS_ERROR -ne 0 ]; then
                exit 1
              fi
            else
              echo "No C++ files changed"
            fi
          fi

      - name: Remove container
        if: always()
        run: docker rm -f infinity_builder || true

  debug_amd64_build:
    name: debug_amd64_build
    needs: [ check_builder_changes, build_and_push_builder ]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: false
          swap-storage: true

      - name: Check out code
        uses: actions/checkout@v6
        with:
          ref: ${{ (github.event_name == 'pull_request' || github.event_name == 'pull_request_target') && format('refs/pull/{0}/merge', github.event.pull_request.number) || github.sha }}
          fetch-depth: 0
          fetch-tags: false
          submodules: recursive

      - name: Start builder container
        run: |
          docker run --privileged -d --name infinity_builder -v ${PWD}:/infinity -v ${PWD}/resource:/usr/share/infinity/resource infiniflow/infinity-x64-x64-v2-builder:${{ needs.check_builder_changes.outputs.image_tag }}

      - name: Create libstdc++ modules JSON for cross-compilation
        run: docker exec infinity_builder bash -c "cp /infinity/.github/workflows/x64-x64-libstdc++.modules.json /x86_64-linux-gnu/lib/gcc/x86_64-linux-gnu/15.2.0/libstdc++.modules.json"

      - name: Build debug version
        run: docker exec infinity_builder bash -c "git config --global safe.directory \"*\" && cd /infinity && rm -rf cmake-build-debug && mkdir -p cmake-build-debug && SYS_ROOT=/x86_64-linux-gnu/x86_64-linux-gnu/sysroot/ GCC_TOOLCHAIN=/x86_64-linux-gnu cmake -G Ninja -DCMAKE_C_COMPILER=clang-20 -DCMAKE_CXX_COMPILER=clang++-20 -DCMAKE_TOOLCHAIN_FILE=\$VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake -DVCPKG_CHAINLOAD_TOOLCHAIN_FILE=\$PWD/cmake/toolchains/x86_64-linux-v2.cmake -DVCPKG_OVERLAY_TRIPLETS=\$PWD/cmake/triplets -DVCPKG_TARGET_TRIPLET=x64-linux-v2 -DCMAKE_CXX_STDLIB_MODULES_JSON=/x86_64-linux-gnu/lib/gcc/x86_64-linux-gnu/15.2.0/libstdc++.modules.json -DCMAKE_BUILD_TYPE=Debug -DCODE_COVERAGE=ON -S /infinity -B /infinity/cmake-build-debug && cmake --build /infinity/cmake-build-debug -j --target infinity test_main"

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: debug-build-amd64
          path: |
            cmake-build-debug/src/infinity
            cmake-build-debug/src/test_main
          retention-days: 1
          if-no-files-found: warn

      - name: Remove build container
        if: always()
        run: docker rm -f infinity_builder || true

  debug_amd64_unit_test:
    name: debug_amd64_unit_test
    runs-on: ubuntu-latest
    needs: debug_amd64_build
    steps:
      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: false
          swap-storage: true

      - name: Check out code
        uses: actions/checkout@v6
        with:
          ref: ${{ (github.event_name == 'pull_request' || github.event_name == 'pull_request_target') && format('refs/pull/{0}/merge', github.event.pull_request.number) || github.sha }}
          fetch-depth: 0
          submodules: recursive

      - name: Start minio container
        run: |
          docker run -d --name minio --network host -e "MINIO_ROOT_PASSWORD=minioadmin" -e "MINIO_ROOT_USER=minioadmin" -v /tmp/minio-data:/data quay.io/minio/minio server /data --console-address ":9006" --address ":9005"

      - name: Download debug unit test build artifacts
        uses: actions/download-artifact@v8
        with:
          name: debug-build-amd64

      - name: Prepare environment
        run: |
          chmod +x test_main
          sudo mkdir -p /usr/share/infinity/resource
          sudo cp -r resource/* /usr/share/infinity/resource/
          sudo chown -R ${USER} /usr/share/infinity
          sudo mkdir -p /var/infinity
          sudo chown -R ${USER} /var/infinity

      - name: Install Python SDK
        uses: astral-sh/setup-uv@v7
      #        with:
      #          enable-cache: true
      - run: uv sync --python 3.11 --extra test -i https://pypi.org/simple/

      - name: Download nltk data
        run: |
          uv run python3 -c "
          import os
          import nltk
          local_dir = os.path.abspath('nltk_data')
          for data in ['wordnet', 'punkt', 'punkt_tab']:
              print(f'Downloading nltk {data}...')
              nltk.download(data, download_dir=local_dir)
          "

      - name: Install LLVM 20
        run: |
          wget https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh 20
          echo "/usr/lib/llvm-20/bin" >> $GITHUB_PATH

      - name: Wait for minio and run unit test
        env:
          NLTK_DATA: ${{ github.workspace }}/nltk_data
          LLVM_PROFILE_FILE: "infinity-%p.profraw"
        run: |
          ./scripts/wait_for_minio.sh
          ASAN_OPTIONS=detect_leaks=0 ./test_main --gtest_filter=-*SLOW_* > debug_unit_test_stdout.log 2> debug_unit_test_stderr.log

      - name: Collect infinity log
        if: always()
        run: |
          echo "debug unit test log" && tail -n 1000 debug_unit_test*.log || true

      - name: Generate LCOV report
        if: always()
        run: |
          llvm-profdata merge -sparse infinity-*.profraw -o coverage.profdata
          llvm-cov export ./test_main -instr-profile=coverage.profdata -format=lcov -ignore-filename-regex='.*unit_test.*|.*third_party.*|.*cmake-build-debug.*|.*cppm.*' > coverage.lcov
          head -10 coverage.lcov
          echo "LCOV file lines: $(wc -l < coverage.lcov)"

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-debug-unit-test-amd64
          path: coverage.lcov
          retention-days: 1
          if-no-files-found: warn

      - name: Remove minio container
        if: always()
        run: docker rm -f minio || true

  debug_amd64_sqllogical_test:
    name: debug_amd64_sqllogical_test
    runs-on: ubuntu-latest
    needs: debug_amd64_build
    steps:
      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: false
          swap-storage: true

      - name: Check out code
        uses: actions/checkout@v6
        with:
